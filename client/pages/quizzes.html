<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quizzes — QuizMaster</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        .quizzes-header {
            background: radial-gradient(ellipse at top, #1e1b4b 0%, var(--dark) 70%);
            padding: 3rem 2rem;
            text-align: center;
            border-bottom: 1px solid var(--border);
        }
        .quizzes-header h1 { font-size: 2rem; font-weight: 800; margin-bottom: 0.5rem; }
        .quizzes-header p { color: var(--text-muted); }
        .search-bar {
            display: flex;
            gap: 1rem;
            max-width: 600px;
            margin: 1.5rem auto 0;
        }
        .search-bar input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            color: var(--text);
            font-size: 1rem;
            outline: none;
        }
        .search-bar input:focus { border-color: var(--primary); }
        .quizzes-body {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 2rem;
        }
        .filter-row {
            display: flex;
            gap: 0.8rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }
        .filter-btn {
            padding: 0.4rem 1rem;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-muted);
            cursor: pointer;
            font-size: 0.85rem;
            transition: all 0.2s;
        }
        .filter-btn.active {
            background: var(--primary);
            border-color: var(--primary);
            color: white;
        }
    </style>
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="dashboard.html" class="logo">⚡ QuizMaster</a>
        <div class="nav-links">
            <a href="dashboard.html">Dashboard</a>
            <a href="quizzes.html">Quizzes</a>
            <a href="history.html">My Results</a>
            <button class="btn btn-danger btn-sm" onclick="logout()">Logout</button>
        </div>
    </nav>

    <!-- HEADER -->
    <div class="quizzes-header">
        <h1>🎯 All Quizzes</h1>
        <p>Browse and take quizzes to test your knowledge</p>
        <div class="search-bar">
            <input type="text" id="searchInput" placeholder="🔍 Search quizzes..."
                oninput="filterQuizzes()"/>
        </div>
    </div>

    <div class="quizzes-body">

        <!-- FILTERS -->
        <div class="filter-row">
            <button class="filter-btn active" onclick="setFilter('all', this)">All</button>
            <button class="filter-btn" onclick="setFilter('short', this)">⚡ Short (≤10 mins)</button>
            <button class="filter-btn" onclick="setFilter('medium', this)">🕐 Medium (10-20 mins)</button>
            <button class="filter-btn" onclick="setFilter('long', this)">⏳ Long (20+ mins)</button>
        </div>

        <!-- RESULTS COUNT -->
        <p style="color:var(--text-muted); margin-bottom:1.5rem; font-size:0.9rem;">
            Showing <span id="quizCount">0</span> quizzes
        </p>

        <!-- QUIZ GRID -->
        <div class="quiz-grid" id="quizGrid">
            <div class="spinner"></div>
        </div>

    </div>

    <footer>
        <p>© 2024 <strong>QuizMaster</strong> — Built with ❤️ using Node.js, Express & MySQL</p>
    </footer>

    <script>
        const token = localStorage.getItem('token');
        if (!token) window.location.href = 'login.html';

        const API = 'https://quiz-platform-production-346c.up.railway.app/api';
        const headers = { 'Authorization': `Bearer ${token}` };

        let allQuizzes = [];
        let currentFilter = 'all';

        async function loadQuizzes() {
            try {
                const res = await fetch(`${API}/quiz`, { headers });
                allQuizzes = await res.json();
                renderQuizzes(allQuizzes);
            } catch (error) {
                console.error('Error loading quizzes:', error);
            }
        }

        function renderQuizzes(quizzes) {
            const grid = document.getElementById('quizGrid');
            document.getElementById('quizCount').textContent = quizzes.length;

            if (quizzes.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column:1/-1;">
                        <div class="empty-icon">📭</div>
                        <h3>No quizzes found</h3>
                        <p>Try a different search or filter</p>
                    </div>`;
                return;
            }

            grid.innerHTML = quizzes.map(q => `
                <div class="quiz-card">
                    <div style="display:flex; justify-content:space-between; align-items:start;">
                        <h3>${q.title}</h3>
                        <span class="badge ${getTimeBadgeClass(q.time_limit)}">
                            ${getTimeLabel(q.time_limit)}
                        </span>
                    </div>
                    <p>${q.description || 'No description provided.'}</p>
                    <div class="quiz-meta">
                        <span class="badge badge-primary">⏱ ${q.time_limit} mins</span>
                        <span class="badge badge-warning">❓ ${q.total_questions} questions</span>
                        <span class="badge badge-success">✍️ ${q.created_by_name}</span>
                    </div>
                    <a href="quiz.html?id=${q.id}" class="btn btn-primary" style="width:100%; justify-content:center;">
                        Start Quiz →
                    </a>
                </div>
            `).join('');
        }

        function getTimeBadgeClass(mins) {
            if (mins <= 10) return 'badge-success';
            if (mins <= 20) return 'badge-warning';
            return 'badge-danger';
        }

        function getTimeLabel(mins) {
            if (mins <= 10) return '⚡ Short';
            if (mins <= 20) return '🕐 Medium';
            return '⏳ Long';
        }

        function filterQuizzes() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            let filtered = allQuizzes.filter(q =>
                q.title.toLowerCase().includes(search) ||
                (q.description && q.description.toLowerCase().includes(search))
            );
            if (currentFilter === 'short') filtered = filtered.filter(q => q.time_limit <= 10);
            else if (currentFilter === 'medium') filtered = filtered.filter(q => q.time_limit > 10 && q.time_limit <= 20);
            else if (currentFilter === 'long') filtered = filtered.filter(q => q.time_limit > 20);
            renderQuizzes(filtered);
        }

        function setFilter(filter, btn) {
            currentFilter = filter;
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            filterQuizzes();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('user');
            window.location.href = 'login.html';
        }

        loadQuizzes();
    </script>

</body>
</html>
