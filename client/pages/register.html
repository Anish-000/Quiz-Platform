<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — QuizMaster</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html" class="logo">⚡ QuizMaster</a>
        <div class="nav-links">
            <a href="login.html">Already have an account? <strong>Sign In</strong></a>
        </div>
    </nav>

    <!-- REGISTER FORM -->
    <div class="auth-container">
        <div class="auth-box">

            <h2>Create Account 🎯</h2>
            <p>Join thousands of learners on QuizMaster</p>

            <div class="alert alert-error" id="errorAlert"></div>
            <div class="alert alert-success" id="successAlert"></div>

            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="name" placeholder="John Doe" />
            </div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Min. 6 characters" />
            </div>

            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirmPassword" placeholder="Repeat your password" />
            </div>

            <div class="form-group">
                <label>Register As</label>
                <select id="role">
                    <option value="student">Student</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="handleRegister()">
                Create Account →
            </button>

            <div class="auth-footer">
                Already have an account? <a href="login.html">Sign in here</a>
            </div>

        </div>
    </div>

    <script>
        async function handleRegister() {
            const name = document.getElementById('name').value.trim();
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const confirmPassword = document.getElementById('confirmPassword').value.trim();
            const role = document.getElementById('role').value;
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');

            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';

            // Validation
            if (!name || !email || !password || !confirmPassword) {
                errorAlert.textContent = 'Please fill in all fields.';
                errorAlert.style.display = 'block';
                return;
            }

            if (password.length < 6) {
                errorAlert.textContent = 'Password must be at least 6 characters.';
                errorAlert.style.display = 'block';
                return;
            }

            if (password !== confirmPassword) {
                errorAlert.textContent = 'Passwords do not match.';
                errorAlert.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('https://quiz-platform-production-346c.up.railway.app/api/auth/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password, role })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorAlert.textContent = data.message || 'Registration failed.';
                    errorAlert.style.display = 'block';
                    return;
                }

                successAlert.textContent = 'Account created successfully! Redirecting to login...';
                successAlert.style.display = 'block';

                setTimeout(() => {
                    window.location.href = 'login.html';
                }, 1500);

            } catch (error) {
                errorAlert.textContent = 'Cannot connect to server. Make sure it is running.';
                errorAlert.style.display = 'block';
            }
        }

        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleRegister();
        });
    </script>

</body>
</html>
