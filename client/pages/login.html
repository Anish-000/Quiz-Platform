<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — QuizMaster</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>

    <!-- NAVBAR -->
    <nav class="navbar">
        <a href="index.html" class="logo">⚡ QuizMaster</a>
        <div class="nav-links">
            <a href="register.html">Don't have an account? <strong>Sign Up</strong></a>
        </div>
    </nav>

    <!-- LOGIN FORM -->
    <div class="auth-container">
        <div class="auth-box">

            <h2>Welcome Back 👋</h2>
            <p>Sign in to continue to QuizMaster</p>

            <div class="alert alert-error" id="errorAlert"></div>
            <div class="alert alert-success" id="successAlert"></div>

            <div class="form-group">
                <label>Email Address</label>
                <input type="email" id="email" placeholder="you@example.com" />
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="Enter your password" />
            </div>

            <button class="btn btn-primary" style="width:100%; justify-content:center;" onclick="handleLogin()">
                Sign In →
            </button>

            <div class="auth-footer">
                Don't have an account? <a href="register.html">Create one free</a>
            </div>

        </div>
    </div>

    <script>
        // Redirect if already logged in
        const token = localStorage.getItem('token');
        const user = JSON.parse(localStorage.getItem('user') || '{}');
        if (token) {
            window.location.href = user.role === 'admin' ? 'admin/admin-dashboard.html' : 'dashboard.html';
        }

        async function handleLogin() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const errorAlert = document.getElementById('errorAlert');
            const successAlert = document.getElementById('successAlert');

            errorAlert.style.display = 'none';
            successAlert.style.display = 'none';

            if (!email || !password) {
                errorAlert.textContent = 'Please fill in all fields.';
                errorAlert.style.display = 'block';
                return;
            }

            try {
                const res = await fetch('http://localhost:5000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });

                const data = await res.json();

                if (!res.ok) {
                    errorAlert.textContent = data.message || 'Login failed.';
                    errorAlert.style.display = 'block';
                    return;
                }

                // Save token and user
                localStorage.setItem('token', data.token);
                localStorage.setItem('user', JSON.stringify(data.user));

                successAlert.textContent = 'Login successful! Redirecting...';
                successAlert.style.display = 'block';

                // Redirect based on role
                setTimeout(() => {
                    if (data.user.role === 'admin') {
                        window.location.href = 'admin/admin-dashboard.html';
                    } else {
                        window.location.href = 'dashboard.html';
                    }
                }, 1000);

            } catch (error) {
                errorAlert.textContent = 'Cannot connect to server. Make sure it is running.';
                errorAlert.style.display = 'block';
            }
        }

        // Allow Enter key to submit
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') handleLogin();
        });
    </script>

</body>
</html>
